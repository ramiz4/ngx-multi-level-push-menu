name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '17 04 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NX_DAEMON: false
  NX_ISOLATE_PLUGINS: false
  NPM_VERSION: 11.18.0

jobs:
  validate:
    name: Validate (Node ${{ matrix.node-version }})
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CYPRESS_INSTALL_BINARY: '0'
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Use the pinned npm version
        run: npm install --global npm@"$NPM_VERSION" --ignore-scripts

      - name: Install dependencies
        run: npm ci

      - name: Validate PR title and commits
        if: github.event_name == 'pull_request' && matrix.node-version == '22.x'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          printf '%s\n' "$PR_TITLE" | npx --no-install commitlint --verbose
          npx --no-install commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

      - name: Validate release automation
        if: matrix.node-version == '22.x'
        run: npm run validate:automation

      - name: Audit production dependencies
        if: matrix.node-version == '22.x'
        run: npm audit --omit=dev --audit-level=high

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:ci

      - name: Build library
        run: npm run build:lib

      - name: Build example application
        run: npm run build:app

      - name: Validate GitHub Pages artifact
        if: matrix.node-version == '22.x'
        env:
          BASE_HREF: /ngx-multi-level-push-menu/
        run: |
          npm run build:app -- --configuration=production --base-href "$BASE_HREF"
          npm run prepare:pages

      - name: Validate distributable package
        run: |
          node tools/scripts/validate-package.mjs
          npm pack ./dist/libs/ngx-multi-level-push-menu --dry-run

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Reject newly introduced vulnerable dependencies
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  consumer-compatibility:
    name: Consumer (Angular ${{ matrix.angular }})
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      CYPRESS_INSTALL_BINARY: '0'
    strategy:
      fail-fast: false
      matrix:
        include:
          - angular: 20.3.26
            typescript: 5.9.3
          - angular: 21.2.18
            typescript: 5.9.3
          - angular: 22.0.6
            typescript: 6.0.3

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.22.3
          cache: npm

      - name: Use the pinned npm version
        run: npm install --global npm@"$NPM_VERSION" --ignore-scripts

      - name: Install workspace dependencies
        run: npm ci

      - name: Build distributable library
        run: npm run build:lib

      - name: Compile strict standalone and NgModule consumers
        run: >-
          node tools/scripts/verify-angular-consumer.mjs
          ${{ matrix.angular }}
          ${{ matrix.typescript }}

  e2e:
    name: End-to-end (Chrome)
    if: github.event_name != 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: npm

      - name: Use the pinned npm version
        run: npm install --global npm@"$NPM_VERSION" --ignore-scripts

      - name: Cache Cypress binary
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install and verify Cypress
        run: |
          npx cypress install
          npx cypress verify

      - name: Run Cypress end-to-end tests
        run: >-
          npx nx e2e multi-level-push-menu-example-e2e
          --configuration=production
          --browser=chrome

      - name: Upload Cypress failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cypress-failure-artifacts
          path: |
            dist/cypress/apps/multi-level-push-menu-example-e2e/screenshots
            dist/cypress/apps/multi-level-push-menu-example-e2e/videos
          if-no-files-found: ignore
          retention-days: 7

  codeql:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Analyze JavaScript and TypeScript
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:javascript-typescript

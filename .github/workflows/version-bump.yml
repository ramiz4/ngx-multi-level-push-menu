name: Prepare release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact stable version to release (for example, 20.0.0)
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: prepare-release
  cancel-in-progress: false

env:
  CI: true
  NX_DAEMON: false
  NX_ISOLATE_PLUGINS: false

jobs:
  prepare:
    name: Prepare v${{ inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Validate requested version
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const requested = process.env.RELEASE_VERSION;
          const root = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const library = JSON.parse(
            fs.readFileSync('libs/ngx-multi-level-push-menu/package.json', 'utf8'),
          );
          const stableSemver = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/;

          if (!stableSemver.test(requested)) {
            throw new Error(`Version must have the form X.Y.Z (received: ${requested}).`);
          }
          if (Number(requested.split('.')[0]) < 20) {
            throw new Error('The declarative Angular 20+ line must be released as version 20.0.0 or newer.');
          }
          if (root.version !== library.version) {
            throw new Error(
              `Current root (${root.version}) and library (${library.version}) versions differ.`,
            );
          }
          if (!stableSemver.test(root.version)) {
            throw new Error(`Current version is not stable semver: ${root.version}.`);
          }

          const compare = (left, right) => {
            const a = left.split('.').map(Number);
            const b = right.split('.').map(Number);
            for (let index = 0; index < a.length; index += 1) {
              if (a[index] !== b[index]) {
                return a[index] - b[index];
              }
            }
            return 0;
          };

          if (requested === root.version || compare(requested, root.version) <= 0) {
            throw new Error(
              `Requested version ${requested} must be greater than ${root.version}.`,
            );
          }
          NODE

          git fetch --tags origin
          if git rev-parse --verify --quiet "refs/tags/v$RELEASE_VERSION"; then
            echo "Tag v$RELEASE_VERSION already exists." >&2
            exit 1
          fi

      - name: Update package versions consistently
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          npm version "$RELEASE_VERSION" \
            --no-git-tag-version \
            --ignore-scripts
          npm --prefix libs/ngx-multi-level-push-menu version "$RELEASE_VERSION" \
            --no-git-tag-version \
            --ignore-scripts

          CHANGED_FILES=$(git diff --name-only)
          UNEXPECTED_FILES=$(printf '%s\n' "$CHANGED_FILES" | grep -Ev \
            '^(package\.json|package-lock\.json|libs/ngx-multi-level-push-menu/package\.json)$' || true)
          if [[ -n "$UNEXPECTED_FILES" ]]; then
            echo "Versioning changed unexpected files:" >&2
            echo "$UNEXPECTED_FILES" >&2
            exit 1
          fi

      - name: Install dependencies from updated lockfile
        run: npm ci

      - name: Install and verify Cypress
        run: |
          npx cypress install
          npx cypress verify

      - name: Validate release candidate
        run: |
          npm audit --omit=dev --audit-level=high
          npm run format
          npm run lint
          npm run test:ci
          npm run build:lib
          npm run build:app
          npx nx e2e multi-level-push-menu-example-e2e \
            --configuration=production \
            --browser=chrome
          node tools/scripts/validate-package.mjs
          npm pack ./dist/libs/ngx-multi-level-push-menu --dry-run

      - name: Upload Cypress failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-release-candidate-failure-artifacts
          path: |
            dist/cypress/apps/multi-level-push-menu-example-e2e/screenshots
            dist/cypress/apps/multi-level-push-menu-example-e2e/videos
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit and tag release
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_PAT: ${{ secrets.GH_PAT }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json package-lock.json libs/ngx-multi-level-push-menu/package.json
          git commit -m "chore(release): v$RELEASE_VERSION"
          git tag --annotate "v$RELEASE_VERSION" --message "Release v$RELEASE_VERSION"
          AUTH_HEADER=$(printf 'x-access-token:%s' "$GH_PAT" | base64 --wrap=0)
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $AUTH_HEADER" \
            push --atomic origin "HEAD:$DEFAULT_BRANCH" "refs/tags/v$RELEASE_VERSION"

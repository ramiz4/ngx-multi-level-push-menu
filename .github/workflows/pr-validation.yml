name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NX_DAEMON: false
  NX_ISOLATE_PLUGINS: false

jobs:
  validate:
    name: Validate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CYPRESS_INSTALL_BINARY: '0'
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        if: matrix.node-version == '22.x'
        run: npm audit --omit=dev --audit-level=high

      - name: Check formatting
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:ci

      - name: Build library
        run: npm run build:lib

      - name: Build example application
        run: npm run build:app

      - name: Validate distributable package
        run: |
          node tools/scripts/validate-package.mjs
          npm pack ./dist/libs/ngx-multi-level-push-menu --dry-run

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Reject newly introduced vulnerable dependencies
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  consumer-compatibility:
    name: Consumer (Angular ${{ matrix.angular }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CYPRESS_INSTALL_BINARY: '0'
    strategy:
      fail-fast: false
      matrix:
        include:
          - angular: 20.3.26
            typescript: 5.9.3
          - angular: 21.2.18
            typescript: 5.9.3
          - angular: 22.0.6
            typescript: 6.0.3

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.22.3
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Build distributable library
        run: npm run build:lib

      - name: Compile strict standalone and NgModule consumers
        run: >-
          node tools/scripts/verify-angular-consumer.mjs
          ${{ matrix.angular }}
          ${{ matrix.typescript }}

  e2e:
    name: End-to-end (Chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm

      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install and verify Cypress
        run: |
          npx cypress install
          npx cypress verify

      - name: Run Cypress end-to-end tests
        run: >-
          npx nx e2e multi-level-push-menu-example-e2e
          --configuration=production
          --browser=chrome

      - name: Upload Cypress failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: cypress-failure-artifacts
          path: |
            dist/cypress/apps/multi-level-push-menu-example-e2e/screenshots
            dist/cypress/apps/multi-level-push-menu-example-e2e/videos
          if-no-files-found: ignore
          retention-days: 7

version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Zurich
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    groups:
      angular-minor-patch:
        patterns:
          - '@angular/*'
          - '@angular-eslint/*'
          - '@schematics/angular'
          - angular-eslint
          - ng-packagr
        update-types:
          - minor
          - patch
      nx-minor-patch:
        patterns:
          - '@nx/*'
          - nx
        update-types:
          - minor
          - patch
      release-tooling-minor-patch:
        patterns:
          - '@commitlint/*'
          - '@semantic-release/*'
          - conventional-changelog-conventionalcommits
          - semantic-release
        update-types:
          - minor
          - patch
      test-tooling-minor-patch:
        patterns:
          - cypress
          - jest
          - jest-environment-jsdom
          - jest-preset-angular
          - ts-jest
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:30'
      timezone: Europe/Zurich
    groups:
      github-actions:
        patterns:
          - '*'
